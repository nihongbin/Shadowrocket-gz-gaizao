name: Publish S1.1 Public Template

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare public artifact
        run: |
          mkdir -p public
          cp configs/S1-1-scenario-cn-us-lazy-stabilized-v0.conf public/S1-1-scenario-cn-us-lazy-stabilized-v0.conf
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="zh-CN">
          <meta charset="utf-8">
          <title>Shadowrocket S1.1 Public Template</title>
          <body>
            <h1>Shadowrocket S1.1 Public Template</h1>
            <p>This public template contains no proxy nodes, subscriptions, accounts, or proxy groups.</p>
            <p><a href="./S1-1-scenario-cn-us-lazy-stabilized-v0.conf">S1.1 template</a></p>
          </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
