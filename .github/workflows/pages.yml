name: Publish V5 Public Template

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate governed S5 template
        run: |
          python -m unittest discover -s tests -v
          python scripts/build-v5-mvp-template.py --check

      - name: Prepare public artifact
        run: |
          mkdir -p public
          cp configs/S5-scenario-cn-us-v5-mvp-v0.conf public/S5-scenario-cn-us-v5-mvp-v0.conf
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="zh-CN">
          <meta charset="utf-8">
          <title>Shadowrocket Public Templates</title>
          <body>
            <h1>Shadowrocket Public Templates</h1>
            <p>These public templates contain no proxy nodes, subscriptions, accounts, or proxy groups.</p>
            <p><a href="./S5-scenario-cn-us-v5-mvp-v0.conf">S5 V5 MVP template</a></p>
          </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
