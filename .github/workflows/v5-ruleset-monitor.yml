name: Monitor V5 Ruleset Semantics

on:
  schedule:
    - cron: "17 20 * * *"
  workflow_dispatch:
    inputs:
      simulate_source_id:
        description: "Optional source id for notification-path simulation; never applied"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: v5-ruleset-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted main branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compare upstream rule semantics
        id: monitor
        env:
          SIMULATE_SOURCE_ID: ${{ github.event.inputs.simulate_source_id || '' }}
        run: |
          if [ -n "$SIMULATE_SOURCE_ID" ]; then
            python scripts/manage-v5-rulesets.py monitor \
              --json-out "$RUNNER_TEMP/v5-monitor.json" \
              --markdown-out "$RUNNER_TEMP/v5-monitor.md" \
              --github-output "$GITHUB_OUTPUT" \
              --simulate-source-id "$SIMULATE_SOURCE_ID"
          else
            python scripts/manage-v5-rulesets.py monitor \
              --json-out "$RUNNER_TEMP/v5-monitor.json" \
              --markdown-out "$RUNNER_TEMP/v5-monitor.md" \
              --github-output "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub notification issue
        if: steps.monitor.outputs.action_required == 'true'
        uses: actions/github-script@v7
        env:
          REPORT_JSON: ${{ runner.temp }}/v5-monitor.json
          REPORT_MARKDOWN: ${{ runner.temp }}/v5-monitor.md
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync(process.env.REPORT_JSON, 'utf8'));
            const markdown = fs.readFileSync(process.env.REPORT_MARKDOWN, 'utf8');
            const simulated = Boolean(report.simulated_source_id);
            const title = simulated
              ? '[V5规则源监控][模拟] 通知链路验证'
              : '[V5规则源监控] 上游变化或异常待确认';
            const labelNames = simulated
              ? ['v5-ruleset-monitor', 'simulation']
              : ['v5-ruleset-monitor'];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${markdown}\n---\nActions run: ${runUrl}\n`;

            for (const name of labelNames) {
              try {
                await github.rest.issues.getLabel({ ...context.repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  ...context.repo,
                  name,
                  color: name === 'simulation' ? 'D4C5F9' : 'FBCA04',
                  description: name === 'simulation'
                    ? 'Automation notification-path simulation'
                    : 'V5 upstream semantic change or monitor failure'
                });
              }
            }

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              ...context.repo,
              state: 'open',
              labels: labelNames.join(','),
              per_page: 100
            });
            const existing = openIssues.find(issue => !issue.pull_request && issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                ...context.repo,
                issue_number: existing.number,
                body
              });
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: existing.number,
                body: `监控报告已更新：${runUrl}`
              });
            } else {
              await github.rest.issues.create({
                ...context.repo,
                title,
                body,
                labels: labelNames
              });
            }
