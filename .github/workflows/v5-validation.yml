name: Validate V5 Governed Rules

on:
  pull_request:
    paths:
      - "configs/S5-scenario-cn-us-v5-mvp-v0.conf"
      - "references/v5-mvp/**"
      - "rulesets/v5/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run governed V5 checks
        run: |
          python -m unittest discover -s tests -v
          python scripts/manage-v5-rulesets.py validate
          python scripts/build-v5-mvp-template.py --check
